<app-navbar *ngIf="showNavbar()"></app-navbar>

<div class="app-shell" [class.app-shell--with-navbar]="showNavbar">
  <div 
    class="app-container"
    [class.app-container--with-sidebar]="showSidebar()"
  >
    <app-sidebar *ngIf="showSidebar()"></app-sidebar>

    <main class="app-main">
      <app-toast></app-toast>
      <app-loader></app-loader>
      <app-confirm></app-confirm>
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
