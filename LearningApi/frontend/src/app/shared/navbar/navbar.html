<header class="app-navbar">
  <div class="app-navbar__inner">
    <a class="app-brand" routerLink="/dashboard">
      <span class="app-brand__mark">B</span>
      <span class="app-brand__copy">
        <strong>BrightPath</strong>
      </span>
    </a>

    <div class="app-navbar__actions">
      @if (isLoggedIn()) {
        <button class="button button-primary button-small" type="button" (click)="logout()">Logout</button>
      } @else {
        <a class="button button-secondary button-small" routerLink="/register">Create account</a>
        <a class="button button-primary button-small" routerLink="/login">Sign in</a>
      }
    </div>
  </div>
</header>
